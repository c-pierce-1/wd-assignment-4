<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>ROCK PAPER SCISSORS</h1>
    </header>

    <main>
        <section id="outcome-section">
            <h1 id="result-text">Click A Throw To Start!</h1>
            <button id="play-again-btn" disabled>Play Again?</button>
        </section>

        <section id="player-section" class="game-board">
            <div class="choice" data-choice="rock">
                <img src="images/rock.png" alt="Rock">
                <p>ROCK</p>
            </div>
            <div class="choice" data-choice="paper">
                <img src="images/paper.png" alt="Paper">
                <p>PAPER</p>
            </div>
            <div class="choice" data-choice="scissors">
                <img src="images/scissors.png" alt="Scissors">
                <p>SCISSORS</p>
            </div>
        </section>

        <section id="computer-section" class="game-board">
            <div class="computer-choice">
                <img id="computer-img" src="images/question-mark.png" alt="Question Mark">
                <p id="computer-text">WAITING...</p>
            </div>
        </section>
        <h2>COMPUTER THROW</h2>

        <section id="score-section">
            <p>Wins: <span id="wins">0</span> | Losses: <span id="losses">0</span> | Ties: <span id="ties">0</span></p>
            <button id="reset-btn">Reset All Scores</button>
        </section>
    </main>
</body>

</html>
